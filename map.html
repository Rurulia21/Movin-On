<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>自己探究マップ</title>

<link rel="stylesheet" href="map.css">

</head>

<body>

<header>

<a href="index.html">
← Movin' On に戻る
</a>

</header>


<main>

<h1>自己探究マップ</h1>

<p class="description">
自分の興味・将来・人間関係などを書き出し、
自分自身を見つめ直すためのマップです。
</p>


<div class="map">

<button class="node center"
data-node="self">
自分
</button>


<button class="node hobby"
data-node="hobby">
趣味
</button>


<button class="node study"
data-node="study">
学業
</button>


<button class="node future"
data-node="future">
将来
</button>


<button class="node relation"
data-node="relation">
人間関係
</button>


<button class="node other"
data-node="other">
その他
</button>

</div>

</main>


<!-- メモ画面 -->

<div class="panel">

<div class="panel-header">

<h2 id="panel-title">
タイトル
</h2>

<button id="close">
×
</button>

</div>


<textarea
id="memo"
placeholder="自由に書き込めます">
</textarea>


<button id="save">
保存
</button>

</div>


<script src="map.js"></script>

</body>
</html>
